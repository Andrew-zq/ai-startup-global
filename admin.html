<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Console — AI Startup Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
  <header class="portal-nav"><a class="brand" href="index.html"><span class="mark">A<span>✦</span></span><b>AI Startup<br>Global</b></a><div><button class="lang-toggle" data-admin-lang>中文</button><a class="btn ghost compact" href="dashboard.html">User view →</a></div></header>
  <main class="admin-shell">
    <section class="admin-heading"><p>ADMIN CONSOLE</p><h1>Manage the<br><em>community.</em></h1><div><span data-admin-event-count>0 events</span><span data-admin-user-count>0 users</span></div></section>
    <nav class="admin-tabs"><button class="active" data-admin-tab="events">Events</button><button data-admin-tab="users">Users & membership</button></nav>
    <section data-admin-panel="events"><div class="admin-toolbar"><h2>Activity content</h2><button class="btn dark compact" data-new-event>＋ New event</button></div><div class="admin-events" data-admin-events></div></section>
    <section data-admin-panel="users" hidden><div class="admin-toolbar"><h2>Users & membership</h2></div><div class="admin-users" data-admin-users></div></section>
  </main>
  <div class="editor-modal" data-event-editor hidden>
    <div class="auth-backdrop" data-editor-close></div>
    <form class="event-editor">
      <button type="button" class="auth-close" data-editor-close>×</button><h2 data-editor-title>Edit event</h2><input type="hidden" name="id">
      <div class="editor-grid">
        <label><span>English title</span><input name="title" required></label><label><span>中文标题</span><input name="titleZh"></label>
        <label><span>Date and time</span><input name="date" type="datetime-local" required></label><label><span>Zoom / session entrance URL</span><input name="url" type="url" placeholder="Zoom join link, Google Meet, Teams, or Luma..."></label>
        <label><span>Location</span><input name="location"></label><label><span>中文地点</span><input name="locationZh"></label>
        <label><span>Type</span><input name="type"></label><label><span>中文类型</span><input name="typeZh"></label>
        <label class="wide"><span>English description</span><textarea name="description"></textarea></label><label class="wide"><span>中文简介</span><textarea name="descriptionZh"></textarea></label>
      </div>
      <p class="auth-message" data-editor-message></p><button class="btn dark" type="submit">Save event</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="supabase-client.js"></script><script src="supabase-data.js"></script><script src="auth-config.js"></script><script src="events-config.js"></script><script src="admin.js"></script>
</body>
</html>
