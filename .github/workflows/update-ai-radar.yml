name: Update AI Radar

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: ai-radar-daily
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Fetch daily AI repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-github-trending.mjs
      - name: Commit updated radar data
        id: commit
        run: |
          if git diff --quiet -- data/github-trending.json; then
            echo "No data changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-trending.json
          git commit -m "update daily AI radar"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Publish refreshed data to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 20
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
